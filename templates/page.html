<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貢獻總覽</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --fg: #1a1916;
      --muted: #6b6964;
      --border: #e8e5df;
      --accent: #2563eb;

      --feat: #2f7d4a;
      --fix: #b53a2a;
      --docs: #6366f1;
      --refactor: #d97706;
      --test: #0891b2;
      --chore: #6b7280;
      --ci: #7c3aed;
      --build: #ea580c;
      --style: #db2777;
      --perf: #059669;
      --other: #9a9a95;

      --font-display: 'Playfair Display', 'Noto Serif TC', Georgia, serif;
      --font-body: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

      --fs-display: clamp(52px, 6vw, 84px);
      --fs-h1: clamp(36px, 4vw, 52px);
      --fs-h2: clamp(28px, 3vw, 40px);
      --fs-body: 22px;
      --fs-small: 20px;
      --fs-xs: 18px;

      --gap-xs: 8px;
      --gap-sm: 12px;
      --gap-md: 20px;
      --gap-lg: 32px;
      --gap-xl: 56px;
      --gap-2xl: 96px;
      --container: 1120px;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-size: var(--fs-body);
      color: var(--fg);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    main {
      scroll-snap-type: y mandatory;
      overflow-y: auto;
      height: 100vh;
    }

    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--gap-xl) var(--gap-md);
      position: relative;
    }

    .slide--scrollable {
      justify-content: flex-start;
      padding-top: var(--gap-lg);
    }

    .slide-inner {
      width: 100%;
      max-width: var(--container);
    }

    .scroll-container {
      width: 100%;
      max-width: var(--container);
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      overflow-x: auto;
      padding-right: var(--gap-xs);
    }

    /* Typography */
    .display {
      font-family: var(--font-display);
      font-size: var(--fs-display);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .h1 {
      font-family: var(--font-display);
      font-size: var(--fs-h1);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: var(--gap-lg);
    }

    .h2 {
      font-family: var(--font-display);
      font-size: var(--fs-h2);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .caps {
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    .xs { font-size: var(--fs-xs); }
    .small { font-size: var(--fs-small); }
    .muted { color: var(--muted); }
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    .metric {
      font-family: var(--font-display);
      font-size: clamp(40px, 5vw, 60px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* Navigation Dots */
    .slide-nav {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }

    .nav-dot {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0;
    }

    .nav-dot[aria-current="true"] {
      background: var(--fg);
      border-color: var(--fg);
      width: 12px;
      height: 12px;
    }

    .nav-dot:not([aria-current="true"]) {
      width: 10px;
      height: 10px;
    }

    .nav-dot-label {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-size: var(--fs-xs);
      color: var(--fg);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
      background: var(--surface);
      padding: 2px 8px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .nav-dot:hover .nav-dot-label,
    .nav-dot:focus-visible .nav-dot-label { opacity: 1; }

    .nav-dot:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* KPI Grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap-md);
      width: 100%;
      max-width: var(--container);
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--gap-md) var(--gap-md) var(--gap-lg);
      display: flex;
      flex-direction: column;
      gap: var(--gap-xs);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .kpi-card--green { background: #f0fdf4; }
    .kpi-card--red { background: #fef2f2; }
    .kpi-card--accent { background: #eff6ff; }

    .kpi-value { font-size: clamp(32px, 4vw, 48px); font-weight: 700; font-family: var(--font-display); line-height: 1.2; }
    .kpi-unit { font-size: var(--fs-small); color: var(--muted); }

    /* Timeline */
    .timeline-chart {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 240px;
      width: 100%;
      max-width: var(--container);
      padding-bottom: 40px;
      position: relative;
    }

    .bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      position: relative;
    }

    .bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      transition: height 1s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column-reverse;
      align-items: stretch;
      overflow: hidden;
    }

    .bar:not(.bar--zero) { min-height: 2px; }

    .bar-segment {
      width: 100%;
      min-height: 0;
    }

    .bar-label {
      position: absolute;
      bottom: -36px;
      font-size: var(--fs-xs);
      color: var(--muted);
      transform: rotate(-45deg);
      transform-origin: top left;
      white-space: nowrap;
    }

    .peak-annotation {
      position: absolute;
      top: -24px;
      font-size: var(--fs-xs);
      color: var(--accent);
      white-space: nowrap;
      font-weight: 600;
    }

    /* Type Breakdown */
    .breakdown-list {
      width: 100%;
      max-width: var(--container);
      display: flex;
      flex-direction: column;
      gap: var(--gap-sm);
    }

    .breakdown-row {
      display: grid;
      grid-template-columns: 180px 1fr 60px;
      align-items: center;
      gap: var(--gap-sm);
    }

    .breakdown-label { font-size: var(--fs-small); font-weight: 500; white-space: nowrap; }

    .breakdown-bar-track {
      height: 28px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .breakdown-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .breakdown-pct { font-size: var(--fs-small); color: var(--muted); text-align: right; font-family: var(--font-mono); }

    /* Projects */
    .project-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--gap-md);
      width: 100%;
      max-width: var(--container);
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--gap-md);
      display: flex;
      flex-direction: column;
      gap: var(--gap-sm);
    }

    .project-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }

    .project-card h3 a {
      color: inherit;
      text-decoration: none;
    }

    .project-card h3 a:hover {
      color: var(--accent);
    }

    .project-stats {
      display: flex;
      gap: var(--gap-md);
      font-size: var(--fs-small);
      color: var(--muted);
    }

    .project-lines { font-size: var(--fs-small); font-family: var(--font-mono); }
    .line-add { color: var(--feat); }
    .line-del { color: var(--fix); }

    .type-badges { display: flex; flex-wrap: wrap; gap: var(--gap-xs); margin-top: var(--gap-xs); }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: var(--fs-xs);
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .badge-feat { color: var(--feat); background: #2f7d4a1a; }
    .badge-fix { color: var(--fix); background: #b53a2a1a; }
    .badge-docs { color: var(--docs); background: #6366f11a; }
    .badge-refactor { color: var(--refactor); background: #d977061a; }
    .badge-test { color: var(--test); background: #0891b21a; }
    .badge-chore { color: var(--chore); background: #6b72801a; }
    .badge-ci { color: var(--ci); background: #7c3aed1a; }
    .badge-build { color: var(--build); background: #ea580c1a; }
    .badge-style { color: var(--style); background: #db27771a; }
    .badge-perf { color: var(--perf); background: #0596691a; }
    .badge-other { color: var(--other); background: #9a9a951a; }

    /* Tables */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--fs-small);
    }

    .data-table th {
      text-align: left;
      padding: var(--gap-sm) var(--gap-sm);
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      white-space: nowrap;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .data-table th button {
      background: none;
      border: none;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      color: inherit;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .data-table th button:hover { color: var(--accent); }

    .sort-arrow { font-size: 18px; opacity: 0.6; }

    .data-table td {
      padding: var(--gap-sm) var(--gap-sm);
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .data-table .date-cell {
      white-space: nowrap;
      min-width: calc(10ch + var(--gap-sm) + var(--gap-sm));
    }

    .data-table tr:nth-child(even) td { background: var(--bg); }
    .data-table tr:hover td { background: var(--border); }

    /* Animations */
    .animate {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .animate.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    .stagger-1 { transition-delay: 100ms; }
    .stagger-2 { transition-delay: 200ms; }
    .stagger-3 { transition-delay: 300ms; }
    .stagger-4 { transition-delay: 400ms; }
    .stagger-5 { transition-delay: 500ms; }
    .stagger-6 { transition-delay: 600ms; }

    /* Cover */
    .cover-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--gap-md);
    }

    .cover-subtitle { color: var(--muted); font-size: var(--fs-body); }
    .cover-generated { color: var(--muted); font-size: var(--fs-xs); }

    .hero-metric {
      margin-top: var(--gap-xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap-xs);
    }

    .hero-metric .metric { font-size: clamp(60px, 8vw, 100px); }
    .hero-metric-label { color: var(--muted); font-size: var(--fs-body); }

    .scroll-indicator {
      position: absolute;
      bottom: var(--gap-lg);
      font-size: 28px;
      color: var(--muted);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(6px); }
    }

    /* Show more button */
    .show-more-btn {
      display: block;
      margin: var(--gap-md) auto 0;
      padding: var(--gap-xs) var(--gap-md);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--fs-small);
      cursor: pointer;
      color: var(--accent);
      font-weight: 500;
      transition: background 0.2s;
    }

    .show-more-btn:hover { background: var(--bg); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: var(--gap-xl);
      font-size: var(--fs-body);
    }

    /* Coverage bars */
    .coverage-bar-track {
      width: 100%;
      max-width: 120px;
      height: 18px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }

    .coverage-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .coverage-cell {
      display: flex;
      align-items: center;
      gap: var(--gap-xs);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
    }

    .test-kpi-row {
      display: flex;
      gap: var(--gap-md);
      margin-bottom: var(--gap-lg);
      flex-wrap: wrap;
    }

    .test-kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--gap-sm) var(--gap-md);
      text-align: center;
      flex: 1;
      min-width: 150px;
    }

    .test-kpi-value {
      font-family: var(--font-display);
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 700;
      line-height: 1.2;
    }

    .test-kpi-label {
      font-size: var(--fs-xs);
      color: var(--muted);
      margin-top: 4px;
    }

    /* Responsive */
    @media (min-width: 601px) {
      .project-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 901px) {
      .project-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 1199px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 920px) {
      main { scroll-snap-type: none; height: auto; }
      .slide { min-height: auto; padding: var(--gap-lg) var(--gap-md); }
      .slide-nav { display: none; }
      .kpi-grid { grid-template-columns: 1fr; }
      .breakdown-row { grid-template-columns: 120px 1fr 50px; }
      .scroll-container { max-height: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .animate { opacity: 1 !important; transform: none !important; transition: none !important; }
      .bar { transition: none !important; }
      .breakdown-bar-fill { transition: none !important; }
      .scroll-indicator { animation: none; }
    }
  </style>
</head>
<body>
  <nav class="slide-nav" aria-label="頁面導覽" id="slideNav"></nav>

  <main id="main">
    <section class="slide" id="slide-cover">
      <div class="cover-content">
        <h1 class="display animate" id="coverTitle"></h1>
        <p class="cover-subtitle animate stagger-1" id="coverSubtitle"></p>
        <p class="cover-generated animate stagger-2" id="coverGenerated"></p>
        <div class="hero-metric animate stagger-3">
          <span class="metric" id="heroCounter" data-target="0">0</span>
          <span class="hero-metric-label">次提交</span>
        </div>
      </div>
      <div class="scroll-indicator" aria-hidden="true">↓</div>
    </section>

    <section class="slide" id="slide-kpi">
      <div class="slide-inner">
        <h2 class="h1 animate">關鍵指標</h2>
        <div class="kpi-grid" id="kpiGrid"></div>
      </div>
    </section>

    <section class="slide" id="slide-timeline">
      <div class="slide-inner">
        <h2 class="h1 animate">提交趨勢</h2>
        <div class="timeline-chart animate stagger-1" id="timelineChart"></div>
      </div>
    </section>

    <section class="slide" id="slide-breakdown">
      <div class="slide-inner">
        <h2 class="h1 animate">貢獻類型</h2>
        <div class="breakdown-list" id="breakdownList"></div>
      </div>
    </section>

    <section class="slide slide--scrollable" id="slide-projects">
      <div class="slide-inner">
        <h2 class="h1 animate">專案</h2>
        <div class="scroll-container" id="projectGridContainer">
          <div class="project-grid" id="projectGrid"></div>
        </div>
      </div>
    </section>

    <section class="slide slide--scrollable" id="slide-tests">
      <div class="slide-inner">
        <h2 class="h1 animate">測試</h2>
        <div class="scroll-container" id="testMetricsContainer"></div>
      </div>
    </section>

    <section class="slide slide--scrollable" id="slide-proposals">
      <div class="slide-inner">
        <h2 class="h1 animate">OpenSpec 提案</h2>
        <div class="scroll-container" id="proposalContainer"></div>
      </div>
    </section>

    <section class="slide slide--scrollable" id="slide-commits">
      <div class="slide-inner">
        <h2 class="h1 animate">提交紀錄</h2>
        <div class="scroll-container" id="commitContainer"></div>
      </div>
    </section>
  </main>

  <script>
    var DATA = "__SHOWCASE_DATA__";

    var NAV_LABELS = ['封面', '指標', '提交趨勢', '類型', '專案', '測試', '提案', '紀錄'];
    var SLIDE_IDS = ['slide-cover', 'slide-kpi', 'slide-timeline', 'slide-breakdown', 'slide-projects', 'slide-tests', 'slide-proposals', 'slide-commits'];
    var COMMIT_LIMIT = 100;
    var commitShowAll = false;
    var commitSortCol = null;
    var commitSortAsc = true;

    function init() {
      renderNav();
      renderCover();
      renderKPI();
      renderTimeline();
      renderBreakdown();
      renderProjects();
      renderTestMetrics();
      renderProposals();
      renderCommits();
      initAnimations();
      initNavObserver();
      initKeyboard();
    }

    // --- Navigation ---
    function renderNav() {
      var nav = document.getElementById('slideNav');
      var html = '';
      for (var i = 0; i < SLIDE_IDS.length; i++) {
        html += '<button class="nav-dot" data-slide="' + SLIDE_IDS[i] + '" aria-label="' + NAV_LABELS[i] + '">';
        html += '<span class="nav-dot-label">' + NAV_LABELS[i] + '</span>';
        html += '</button>';
      }
      nav.innerHTML = html;

      var dots = nav.querySelectorAll('.nav-dot');
      for (var j = 0; j < dots.length; j++) {
        dots[j].addEventListener('click', function() {
          var target = document.getElementById(this.getAttribute('data-slide'));
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        });
      }
    }

    function initNavObserver() {
      var dots = document.querySelectorAll('.nav-dot');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var id = entry.target.id;
            for (var i = 0; i < dots.length; i++) {
              var isActive = dots[i].getAttribute('data-slide') === id;
              dots[i].setAttribute('aria-current', isActive ? 'true' : 'false');
            }
          }
        });
      }, { threshold: 0.5 });

      SLIDE_IDS.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) observer.observe(el);
      });
    }

    // --- Cover ---
    function renderCover() {
      document.getElementById('coverTitle').textContent = DATA.title || '貢獻總覽';
      document.getElementById('coverSubtitle').textContent = (DATA.author || '') + ' · ' + (DATA.date_range || '');
      document.getElementById('coverGenerated').textContent = '產生於 ' + (DATA.generated_at || '');
      var counter = document.getElementById('heroCounter');
      counter.setAttribute('data-target', DATA.summary.total_commits || 0);
    }

    // --- KPI ---
    function renderKPI() {
      var grid = document.getElementById('kpiGrid');
      var cards = [
        { label: '總提交', value: DATA.summary.total_commits, cls: '' },
        { label: '活躍儲存庫', value: DATA.summary.total_repos, cls: '' },
        { label: 'OpenSpec 提案', value: DATA.summary.total_proposals, cls: '' },
        { label: '新增行數', value: DATA.summary.lines_added, cls: 'kpi-card--green' },
        { label: '刪除行數', value: DATA.summary.lines_removed, cls: 'kpi-card--red' },
        { label: '日均變更行數', value: Math.round(DATA.summary.avg_daily_lines), unit: '行/天', cls: 'kpi-card--accent' }
      ];

      var html = '';
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        html += '<div class="kpi-card ' + c.cls + ' animate stagger-' + (i + 1) + '">';
        html += '<span class="caps">' + c.label + '</span>';
        html += '<span class="kpi-value counter" data-target="' + (c.value || 0) + '">' + (c.value || 0).toLocaleString('zh-TW') + '</span>';
        if (c.unit) html += '<span class="kpi-unit">' + c.unit + '</span>';
        html += '</div>';
      }
      grid.innerHTML = html;
    }

    // --- Timeline ---
    function renderTimeline() {
      var chart = document.getElementById('timelineChart');
      var timeline = DATA.timeline || [];

      if (timeline.length === 0) {
        chart.innerHTML = '<div class="empty-state">無提交記錄</div>';
        return;
      }

      // Compute global type order: descending by total lines, "other" always last
      var typeTotals = {};
      for (var i = 0; i < timeline.length; i++) {
        var tl = timeline[i].type_lines || {};
        for (var t in tl) {
          if (tl.hasOwnProperty(t)) {
            typeTotals[t] = (typeTotals[t] || 0) + tl[t];
          }
        }
      }
      var typeOrder = Object.keys(typeTotals).filter(function(k) { return k !== 'other'; });
      typeOrder.sort(function(a, b) { return typeTotals[b] - typeTotals[a]; });
      if (typeTotals.hasOwnProperty('other')) {
        typeOrder.push('other');
      }

      // Find peak bucket
      var peakIdx = 0;
      for (var i = 1; i < timeline.length; i++) {
        if (timeline[i].lines > timeline[peakIdx].lines) peakIdx = i;
      }

      var html = '';
      for (var j = 0; j < timeline.length; j++) {
        var entry = timeline[j];
        var isPeak = j === peakIdx;
        html += '<div class="bar-wrapper">';
        if (isPeak && timeline[peakIdx].lines > 0) {
          html += '<span class="peak-annotation">高峰：' + entry.label + '（' + entry.lines.toLocaleString('zh-TW') + '行）</span>';
        }
        var barClass = 'bar' + (entry.lines === 0 ? ' bar--zero' : '');
        html += '<div class="' + barClass + '" style="height: 0%;" data-height="' + entry.height + '">';

        // Stacked segments in global type order
        var tl = entry.type_lines || {};
        if (entry.lines > 0) {
          for (var k = 0; k < typeOrder.length; k++) {
            var type = typeOrder[k];
            if (tl[type] && tl[type] > 0) {
              var pct = (tl[type] / entry.lines * 100).toFixed(2);
              html += '<div class="bar-segment" style="height:' + pct + '%;background:var(--' + type + ', var(--other))"></div>';
            }
          }
        }

        html += '</div>';
        html += '<span class="bar-label">' + entry.label + '</span>';
        html += '</div>';
      }
      chart.innerHTML = html;
    }

    function animateTimeline() {
      var bars = document.querySelectorAll('.bar[data-height]');
      for (var i = 0; i < bars.length; i++) {
        (function(bar) {
          setTimeout(function() {
            bar.style.height = bar.getAttribute('data-height') + '%';
          }, 50);
        })(bars[i]);
      }
    }

    // --- Breakdown ---
    function renderBreakdown() {
      var list = document.getElementById('breakdownList');
      var breakdown = DATA.type_breakdown || [];

      if (breakdown.length === 0) {
        list.innerHTML = '<div class="empty-state">無貢獻類型資料</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < breakdown.length; i++) {
        var entry = breakdown[i];
        var typeClass = entry.commit_type || 'other';
        html += '<div class="breakdown-row animate" style="transition-delay: ' + (i * 80) + 'ms;">';
        html += '<span class="breakdown-label">' + escapeHtml(entry.label) + '（' + entry.lines.toLocaleString('zh-TW') + '行）</span>';
        html += '<div class="breakdown-bar-track"><div class="breakdown-bar-fill" style="width: 0%; background: var(--' + typeClass + ');" data-width="' + entry.percentage + '"></div></div>';
        html += '<span class="breakdown-pct">' + entry.percentage.toFixed(1) + '%</span>';
        html += '</div>';
      }
      list.innerHTML = html;
    }

    function animateBreakdown() {
      var fills = document.querySelectorAll('.breakdown-bar-fill[data-width]');
      for (var i = 0; i < fills.length; i++) {
        (function(fill, delay) {
          setTimeout(function() {
            fill.style.width = fill.getAttribute('data-width') + '%';
          }, delay);
        })(fills[i], i * 80);
      }
    }

    // --- Projects ---
    function renderProjects() {
      var grid = document.getElementById('projectGrid');
      var projects = DATA.projects || [];

      if (projects.length === 0) {
        grid.innerHTML = '<div class="empty-state">無專案資料</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < projects.length; i++) {
        var p = projects[i];
        html += '<div class="project-card animate" style="transition-delay: ' + (i * 100) + 'ms;">';
        var safeUrl = safeProjectUrl(p.url);
        if (safeUrl) {
          html += '<h3 class="h2"><a href="' + escapeHtml(safeUrl) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(p.name) + '</a></h3>';
        } else {
          html += '<h3 class="h2">' + escapeHtml(p.name) + '</h3>';
        }
        if (p.description) html += '<p class="small muted">' + escapeHtml(p.description) + '</p>';
        html += '<div class="project-stats">';
        html += '<span>' + p.commit_count + ' 次提交</span>';
        html += '<span>' + p.proposal_count + ' 提案</span>';
        html += '</div>';
        html += '<div class="project-lines">';
        html += '<span class="line-add">+' + (p.lines_added || 0).toLocaleString('zh-TW') + '</span> ';
        html += '<span class="line-del">−' + (p.lines_removed || 0).toLocaleString('zh-TW') + '</span>';
        html += '</div>';
        if (p.top_types && p.top_types.length > 0) {
          html += '<div class="type-badges">';
          for (var t = 0; t < p.top_types.length; t++) {
            var tt = p.top_types[t];
            html += '<span class="badge badge-' + tt.commit_type + '">' + tt.label + '</span>';
          }
          html += '</div>';
        }
        html += '</div>';
      }
      grid.innerHTML = html;
    }

    // --- Proposals ---
    function renderProposals() {
      var container = document.getElementById('proposalContainer');
      var proposals = DATA.proposals || [];

      if (proposals.length === 0) {
        container.innerHTML = '<div class="empty-state">無提案紀錄</div>';
        return;
      }

      var html = '<table class="data-table"><thead><tr>';
      html += '<th>日期</th><th>專案</th><th>代稱</th><th>工作項</th>';
      html += '</tr></thead><tbody>';

      var lastProject = '';
      for (var i = 0; i < proposals.length; i++) {
        var p = proposals[i];
        var showProject = p.project !== lastProject;
        lastProject = p.project;
        html += '<tr>';
        html += '<td class="date-cell">' + escapeHtml(p.date) + '</td>';
        html += '<td>' + (showProject ? escapeHtml(p.project) : '') + '</td>';
        html += '<td class="mono">' + escapeHtml(p.slug) + '</td>';
        html += '<td>' + (p.task_count || 0) + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // --- Test Metrics ---
    function renderTestMetrics() {
      var container = document.getElementById('testMetricsContainer');
      var metrics = DATA.test_metrics || [];

      if (metrics.length === 0) {
        container.innerHTML = '<div class="empty-state">無測試資料</div>';
        return;
      }

      // First pass: compute totals for KPI
      var totalFiles = 0;
      var totalCases = 0;
      var coverageSum = 0;
      var coverageCount = 0;

      for (var i = 0; i < metrics.length; i++) {
        var m = metrics[i];
        totalFiles += m.test_file_count || 0;
        totalCases += m.test_case_count || 0;
        if (m.coverage_percent != null) {
          coverageSum += m.coverage_percent;
          coverageCount++;
        }
      }

      // Build KPI row FIRST
      var avgCoverage = coverageCount > 0 ? (coverageSum / coverageCount) : null;
      var html = '<div class="test-kpi-row">';
      html += '<div class="test-kpi-card"><div class="test-kpi-value">' + totalFiles + '</div><div class="test-kpi-label">總測試檔案</div></div>';
      html += '<div class="test-kpi-card"><div class="test-kpi-value">' + totalCases + '</div><div class="test-kpi-label">總測試案例</div></div>';
      html += '<div class="test-kpi-card"><div class="test-kpi-value">' + (avgCoverage != null ? avgCoverage.toFixed(1) + '%' : '—') + '</div><div class="test-kpi-label">平均覆蓋率</div></div>';
      html += '</div>';

      // Build table SECOND
      html += '<table class="data-table"><thead><tr>';
      html += '<th>專案</th><th>框架</th><th>測試檔案</th><th>測試案例</th><th>覆蓋率</th>';
      html += '</tr></thead><tbody>';

      for (var i = 0; i < metrics.length; i++) {
        var m = metrics[i];
        html += '<tr>';
        html += '<td>' + escapeHtml(m.project) + '</td>';
        html += '<td class="mono">' + escapeHtml(m.framework) + '</td>';
        html += '<td class="mono">' + (m.test_file_count || 0) + '</td>';
        html += '<td class="mono">' + (m.test_case_count || 0) + '</td>';

        if (m.coverage_percent != null) {
          var pct = m.coverage_percent;
          var color = pct >= 80 ? 'var(--feat)' : pct >= 50 ? 'var(--refactor)' : 'var(--fix)';
          html += '<td><div class="coverage-cell">';
          html += '<div class="coverage-bar-track"><div class="coverage-bar-fill" style="width:' + pct.toFixed(0) + '%;background:' + color + '"></div></div>';
          html += '<span>' + pct.toFixed(1) + '%</span>';
          html += '</div></td>';
        } else {
          html += '<td class="muted">—</td>';
        }
        html += '</tr>';
      }
      html += '</tbody></table>';

      container.innerHTML = html;
    }

    // --- Commits ---
    function renderCommits() {
      var container = document.getElementById('commitContainer');
      var commits = DATA.commits || [];

      if (commits.length === 0) {
        container.innerHTML = '<div class="empty-state">無提交紀錄</div>';
        return;
      }

      var sorted = sortCommits(commits.slice());
      var display = commitShowAll ? sorted : sorted.slice(0, COMMIT_LIMIT);

      var html = '<table class="data-table" id="commitTable"><thead><tr>';
      html += buildSortHeader('date', '日期');
      html += buildSortHeader('project', '專案');
      html += '<th>Hash</th>';
      html += buildSortHeader('commit_type', '類型');
      html += buildSortHeader('subject', '說明');
      html += buildSortHeader('changes', '+/−');
      html += '</tr></thead><tbody>';

      for (var i = 0; i < display.length; i++) {
        var c = display[i];
        var typeClass = c.commit_type || 'other';
        var subject = c.subject || '';
        html += '<tr>';
        html += '<td class="date-cell">' + escapeHtml(c.date) + '</td>';
        html += '<td>' + escapeHtml(c.project) + '</td>';
        html += '<td class="mono">' + escapeHtml(c.hash.substring(0, 8)) + '</td>';
        html += '<td><span class="badge badge-' + typeClass + '">' + escapeHtml(c.commit_type || 'other') + '</span></td>';
        html += '<td>' + escapeHtml(subject) + '</td>';
        html += '<td class="mono"><span class="line-add">+' + (c.insertions || 0) + '</span> <span class="line-del">−' + (c.deletions || 0) + '</span></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';

      if (commits.length > COMMIT_LIMIT) {
        html += '<button class="show-more-btn" id="commitToggle">';
        html += commitShowAll ? '收合' : '顯示全部（' + commits.length + ' 筆）';
        html += '</button>';
      }

      container.innerHTML = html;

      // Bind sort handlers
      var sortBtns = container.querySelectorAll('[data-sort]');
      for (var j = 0; j < sortBtns.length; j++) {
        sortBtns[j].addEventListener('click', function() {
          var col = this.getAttribute('data-sort');
          if (commitSortCol === col) {
            commitSortAsc = !commitSortAsc;
          } else {
            commitSortCol = col;
            commitSortAsc = true;
          }
          renderCommits();
        });
      }

      // Bind show more
      var toggle = document.getElementById('commitToggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          commitShowAll = !commitShowAll;
          renderCommits();
        });
      }
    }

    function buildSortHeader(col, label) {
      var arrow = '';
      var ariaSort = 'none';
      if (commitSortCol === col) {
        arrow = commitSortAsc ? ' <span class="sort-arrow">▲</span>' : ' <span class="sort-arrow">▼</span>';
        ariaSort = commitSortAsc ? 'ascending' : 'descending';
      }
      return '<th aria-sort="' + ariaSort + '"><button data-sort="' + col + '">' + label + arrow + '</button></th>';
    }

    function sortCommits(arr) {
      if (!commitSortCol) return arr;
      var col = commitSortCol;
      var asc = commitSortAsc;
      arr.sort(function(a, b) {
        var va, vb;
        if (col === 'changes') {
          va = (a.insertions || 0) + (a.deletions || 0);
          vb = (b.insertions || 0) + (b.deletions || 0);
        } else {
          va = a[col] || '';
          vb = b[col] || '';
        }
        if (va < vb) return asc ? -1 : 1;
        if (va > vb) return asc ? 1 : -1;
        return 0;
      });
      return arr;
    }

    // --- Animations ---
    function initAnimations() {
      var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      if (reducedMotion) {
        document.querySelectorAll('.animate').forEach(function(el) {
          el.classList.add('in-view');
        });
        // Set all counters (including hero) to final values immediately
        document.querySelectorAll('.counter').forEach(function(el) {
          var target = parseFloat(el.getAttribute('data-target'));
          el.textContent = target ? Math.round(target).toLocaleString('zh-TW') : '0';
        });
        animateTimeline();
        animateBreakdown();
        return;
      }

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
            observer.unobserve(entry.target);

            // Trigger bar/fill animations when parent slide enters view
            if (entry.target.closest('#slide-timeline') || entry.target.id === 'slide-timeline') {
              animateTimeline();
            }
            if (entry.target.closest('#slide-breakdown') || entry.target.id === 'slide-breakdown') {
              animateBreakdown();
            }

            // Counter animation for KPI cards
            var counters = entry.target.querySelectorAll('.counter');
            if (entry.target.classList.contains('counter')) {
              animateCounter(entry.target);
            }
            for (var i = 0; i < counters.length; i++) {
              animateCounter(counters[i]);
            }
          }
        });
      }, { threshold: 0.2 });

      document.querySelectorAll('.animate').forEach(function(el) {
        observer.observe(el);
      });

      // Observe hero counter separately
      var heroCounter = document.getElementById('heroCounter');
      if (heroCounter) {
        var heroObs = new IntersectionObserver(function(entries) {
          if (entries[0].isIntersecting) {
            animateCounter(heroCounter);
            heroObs.unobserve(heroCounter);
          }
        }, { threshold: 0.5 });
        heroObs.observe(heroCounter);
      }
    }

    function animateCounter(el) {
      var target = parseFloat(el.getAttribute('data-target'));
      if (!target || target === 0) { el.textContent = '0'; return; }
      var duration = 1200;
      var start = null;

      function step(timestamp) {
        if (!start) start = timestamp;
        var progress = Math.min((timestamp - start) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        var current = eased * target;
        el.textContent = Math.round(current).toLocaleString('zh-TW');
        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          el.textContent = Math.round(target).toLocaleString('zh-TW');
        }
      }

      requestAnimationFrame(step);
    }

    // --- Keyboard ---
    function initKeyboard() {
      document.addEventListener('keydown', function(e) {
        var tag = e.target.tagName.toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select' || tag === 'button' || tag === 'a') return;
        if (e.target.closest('.scroll-container')) return;

        var slides = document.querySelectorAll('.slide');
        var currentIdx = getCurrentSlideIndex();

        if (e.key === 'ArrowDown' || e.key === 'PageDown') {
          e.preventDefault();
          if (currentIdx < slides.length - 1) {
            slides[currentIdx + 1].scrollIntoView({ behavior: 'smooth' });
          }
        } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
          e.preventDefault();
          if (currentIdx > 0) {
            slides[currentIdx - 1].scrollIntoView({ behavior: 'smooth' });
          }
        }
      });
    }

    function getCurrentSlideIndex() {
      var slides = document.querySelectorAll('.slide');
      var mainEl = document.getElementById('main');
      var scrollTop = mainEl.scrollTop;
      var viewHeight = mainEl.clientHeight;

      for (var i = slides.length - 1; i >= 0; i--) {
        if (slides[i].offsetTop <= scrollTop + viewHeight * 0.5) {
          return i;
        }
      }
      return 0;
    }

    // --- Utilities ---
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeProjectUrl(url) {
      if (!url || !String(url).trim()) return null;
      try {
        var parsed = new URL(String(url), window.location.href);
        if (parsed.protocol === 'https:' || parsed.protocol === 'http:') {
          return parsed.href;
        }
      } catch (_) {}
      return null;
    }

    // --- Boot ---
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
