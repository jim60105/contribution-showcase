# =============================================================================
# Contribution Showcase — Example Configuration
# =============================================================================
#
# Copy this file to `showcase.toml` and edit to match your workspace.
# All paths are relative to where you run the CLI tool.
#
# Reference: every field maps to the Config struct used by the application.
# Fields marked [optional] can be omitted entirely; the tool will use defaults.

# --------------------------------------------------------------------------
# title [optional]
# --------------------------------------------------------------------------
# A human-readable title displayed at the top of the generated report
# and in the browser tab (<title> element).
title = "My Team's Contribution Showcase"

# --------------------------------------------------------------------------
# [output] [optional]
# --------------------------------------------------------------------------
# Controls where the generated report is written.
[output]

# path [optional] — File path for the rendered HTML report.
# Defaults to "dist/index.html" when omitted.
path = "dist/index.html"

# timeline_max_buckets [optional] — Maximum number of timeline buckets before
# the chart escalates to a coarser time granularity (e.g., daily → weekly →
# monthly). Controls the density of bars in the contribution trend chart.
# Defaults to 14 when omitted. Must be ≥ 1.
# timeline_max_buckets = 14

# --------------------------------------------------------------------------
# [filters] [optional]
# --------------------------------------------------------------------------
# Global filters applied to every project when collecting commits.
# All fields below are optional; uncomment and edit as needed.
[filters]

# author [optional] — Only include commits whose author name matches this
# value (exact, case-sensitive match against the Git author name).
# author = "Jane Doe"

# since [optional] — Only include commits on or after this date (ISO 8601,
# YYYY-MM-DD format).
# since = "2025-01-01"

# until [optional] — Only include commits on or before this date (ISO 8601,
# YYYY-MM-DD format).
# until = "2025-06-30"

# types [optional] — A list of Conventional Commit types to include in the
# report. Commits whose type is not in this list are excluded.
# Common types: "feat", "fix", "docs", "style", "refactor", "perf",
#               "test", "build", "ci", "chore", "revert"
# types = ["feat", "fix", "docs", "refactor", "test"]

# exclude_hashes [optional] — A list of full 40-character commit SHA hashes
# to unconditionally exclude (e.g. merge-only commits, reverted mistakes).
# Always use the full hash, not abbreviated forms.
# exclude_hashes = [
#     "e3b0c44298fc1c149afbf4c8996fb92427ae41e4",
#     "da39a3ee5e6b4b0d3255bfef95601890afd80709",
# ]

# ==========================================================================
# [[projects]] — One or more project entries (at least one is required)
# ==========================================================================
#
# Each [[projects]] block describes a Git repository whose commits should
# appear in the report. Add as many entries as you need.

# --- Project 1 ---------------------------------------------------------------
[[projects]]

# name [required] — Short identifier shown in the report header / tabs.
name = "my-backend"

# path [required] — Relative (or absolute) path to the Git repository root.
path = "../my-backend"

# description [optional] — A brief sentence explaining what this project does.
# Displayed as a subtitle under the project name in the report.
description = "REST API server and background workers"

# url [optional] — URL of the project's hosted repository (e.g., GitHub, GitLab).
# When set, the project name in the report becomes a clickable hyperlink.
# url = "https://github.com/user/my-backend"

# branch [optional] — The Git branch to analyse. When omitted the tool uses
# the repository's current HEAD (usually "main" or "master").
branch = "main"

# coverage_command [optional] — Shell command that produces a test-coverage
# report. The tool runs this command inside the project directory and then
# reads the result file specified by coverage_result_path.
#
# Supported output formats (the tool parses these to extract line coverage %):
#   1. Cobertura XML  — any .xml file with <coverage line-rate="...">
#   2. Istanbul JSON   — coverage-summary.json with { "total": { "lines": { "pct": N } } }
#
# Auto-discovery (when coverage_result_path is omitted):
#   The tool checks <project>/coverage.xml first, then
#   <project>/coverage/coverage-summary.json.
#
# Examples:
#   Rust (cargo-llvm-cov):   "cargo llvm-cov --cobertura --output-path coverage.xml"
#   Python (pytest-cov):     "pytest --cov=src --cov-report=xml:coverage.xml"
#   Node.js (vitest):        "npx vitest run --coverage"
#   Node.js (jest):          "npx jest --coverage"
# coverage_command = "cargo llvm-cov --cobertura --output-path coverage.xml"

# coverage_result_path [optional] — Path (relative to the project root) where
# the coverage report is written after running coverage_command.
# Must be a .xml (Cobertura) or .json (Istanbul) file.
# When omitted, auto-discovery checks coverage.xml and
# coverage/coverage-summary.json in the project root.
# coverage_result_path = "coverage.xml"

# --- Project 2 ---------------------------------------------------------------
[[projects]]

name = "my-frontend"
path = "../my-frontend"
description = "Single-page application for the operator console"

# url [optional] — URL of the project's hosted repository (e.g., GitHub, GitLab).
# When set, the project name in the report becomes a clickable hyperlink.
# url = "https://github.com/user/my-frontend"

# branch is omitted here — the tool will use whatever branch is checked out.

# Coverage example for a Node.js / Vitest project (Istanbul JSON output):
# coverage_command = "npx vitest run --coverage"
# coverage_result_path = "coverage/coverage-summary.json"
